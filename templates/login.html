{% load socialaccount %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #f4f6fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 400px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        h2 {
            text-align: center;
            color: #202C45;
            margin-bottom: 25px;
        }

        form p {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #202C45;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #202C45;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #172033;
        }

        .register-link {
            text-align: center;
            margin-top: 15px;
        }

        .register-link a {
            color: #202C45;
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>

<div class="card">

    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>

    <hr>

    <!-- ✅ Google Login -->
    <a href="{% provider_login_url 'google' %}">
        <button type="button">
            Login with Google
        </button>
    </a>

    <div class="register-link">
        <a href="{% url 'register' %}">Register</a>
        <br>
        <a href="{% url 'home' %}">Home</a>
    </div>

</div>

</body>

</html>

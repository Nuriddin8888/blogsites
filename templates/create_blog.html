<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Blog</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #f4f6fb;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
        }

        .container {
            width: 600px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        h1 {
            text-align: center;
            color: #202C45;
            margin-bottom: 30px;
        }

        form p {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #202C45;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #dcdfe6;
            font-size: 14px;
            transition: 0.2s;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        input:focus,
        textarea:focus {
            border-color: #202C45;
            outline: none;
        }

        button {
            width: 100%;
            padding: 13px;
            margin-top: 10px;
            background: #202C45;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.25s;
        }

        button:hover {
            background: #162033;
        }

        .back {
            text-align: center;
            margin-top: 15px;
        }

        .back a {
            text-decoration: none;
            color: #202C45;
            font-weight: 500;
        }

        .back a:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Create Blog</h1>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">Create Blog</button>

        </form>

        <div class="back">
            <a href="{% url 'blog' %}">← Back to Blogs</a>
        </div>

    </div>

</body>

</html>

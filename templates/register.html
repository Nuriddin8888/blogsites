{% load socialaccount %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #f4f6fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 400px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            margin-top: 10px;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 6px;
            margin-top: 15px;
            color: #444;
            transition: 0.3s;
        }

        .google-btn:hover {
            background: #f5f5f5;
        }


        h1 {
            text-align: center;
            color: #202C45;
            margin-bottom: 25px;
        }

        form p {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #202C45;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #202C45;
            color: white;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #172033;
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
        }

        .login-link a {
            color: #202C45;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>

    <div class="card">

        <h1>Register</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Register</button>
        </form>

        <hr>

        <!-- 🔥 Google Button -->
        <a href="{% provider_login_url 'google' %}" class="google-btn">
            <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20">
            Continue with Google
        </a>

        <div class="login-link">
            <a href="{% url 'login' %}">Login</a>
            <br>
            <a href="{% url 'home' %}">Home</a>
        </div>

    </div>

</body>

</html>
